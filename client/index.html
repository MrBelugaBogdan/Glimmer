<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimmer Engine & Studio</title>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --panel-bg: rgba(15, 15, 20, 0.95);
            --accent: #00ffcc;
            --border: #1e1e26;
            --text: #e0e0e0;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
        }

        canvas { display: block; }

        /* --- STUDIO INTERFACE --- */
        #studio-ui {
            display: none; /* Ховаємо при старті */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            grid-template-columns: 250px 1fr 300px;
            grid-template-rows: 40px 1fr 200px;
        }

        .studio-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: #16161e;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: bold;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        /* Explorer (Ліворуч) */
        #explorer { grid-column: 1; grid-row: 2 / 4; }
        
        /* Properties (Праворуч) */
        #properties { grid-column: 3; grid-row: 2 / 4; }

        /* Assets/Console (Низ) */
        #bottom-bar { grid-column: 2; grid-row: 3; border-top: 2px solid var(--accent); }

        /* Top Toolbar */
        #toolbar {
            grid-column: 1 / 4; grid-row: 1;
            background: #111116;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 20px;
            border-bottom: 1px solid var(--accent);
        }

        /* --- GAME UI (HUD) --- */
        #game-hud {
            position: absolute;
            top: 20px; left: 20px;
            pointer-events: none;
        }

        .hud-item {
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-left: 3px solid var(--accent);
            margin-bottom: 5px;
            pointer-events: auto;
        }

        /* --- BUTTONS & INPUTS --- */
        .btn {
            background: #252530;
            border: 1px solid var(--border);
            color: white;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn:hover { background: var(--accent); color: black; }
        .btn.active { border-color: var(--accent); color: var(--accent); }

        input, select, textarea {
            background: #000;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 3px;
            font-family: monospace;
        }

        /* Режим Auth (Реєстрація) */
        #auth-screen {
            position: fixed; inset: 0;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div style="text-align: center; border: 1px solid var(--accent); padding: 40px; background: #0f0f15;">
            <h1 style="color: var(--accent); margin-top: 0;">GLIMMER STUDIO</h1>
            <input type="text" id="nick-input" placeholder="Enter Nickname..." style="padding: 10px; width: 250px; font-size: 16px;">
            <br><br>
            <button class="btn" style="padding: 10px 30px; font-size: 14px;" onclick="window.launchGame()">LAUNCH</button>
        </div>
    </div>

    <div id="game-hud">
        <div class="hud-item">
            <span style="color: #666; font-size: 10px;">PLAYER:</span><br>
            <b id="display-name">Player</b>
        </div>
        <button class="btn" id="studio-toggle-btn" style="pointer-events: auto;">OPEN STUDIO</button>
    </div>

    <div id="studio-ui">
        <div id="toolbar" class="studio-panel">
            <span>Glimmer Editor v0.5</span>
            <div style="display: flex; gap: 5px;">
                <button class="btn" onclick="window.spawnPart()">+ PART</button>
                <button class="btn">MODEL</button>
                <button class="btn" style="color: #ff4444;">DELETE</button>
            </div>
            <div style="margin-left: auto;">
                <button class="btn" onclick="window.toggleStudio()">CLOSE STUDIO</button>
            </div>
        </div>

        <div id="explorer" class="studio-panel">
            <div class="panel-header">EXPLORER <span>Workspace</span></div>
            <div id="explorer-content" style="padding: 10px; font-size: 13px;"></div>
        </div>

        <div id="properties" class="studio-panel">
            <div class="panel-header">PROPERTIES</div>
            <div id="properties-content" style="padding: 15px; font-size: 13px;">
                <p style="color: #555;">Select an object to edit properties...</p>
            </div>
        </div>

        <div id="bottom-bar" class="studio-panel">
            <div class="panel-header">
                <div>CONSOLE | ASSETS</div>
                <button class="btn" style="font-size: 10px;">CLEAR</button>
            </div>
            <div id="console-output" style="padding: 10px; font-family: monospace; font-size: 12px; color: #888; overflow-y: auto;">
                [System]: Glimmer Studio initialized...
            </div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import { GlimmerStudio } from './studio/main.js';

        window.launchGame = () => {
            const nick = document.getElementById('nick-input').value;
            if(nick.length < 2) return alert("Nickname too short!");
            
            document.getElementById('display-name').innerText = nick;
            document.getElementById('auth-screen').style.display = 'none';
            
            // Тут ми можемо ініціалізувати студію, коли гра завантажилась
            window.studio = new GlimmerStudio();
        };

        window.toggleStudio = () => {
            const ui = document.getElementById('studio-ui');
            const isVisible = ui.style.display === 'grid';
            ui.style.display = isVisible ? 'none' : 'grid';
            
            // Повідомляємо двигун про зміну режиму
            window.dispatchEvent(new CustomEvent('studioToggle', { detail: !isVisible }));
        };

        document.getElementById('studio-toggle-btn').onclick = window.toggleStudio;
    </script>

    <script type="module" src="engine.js"></script>

</body>
</html>
