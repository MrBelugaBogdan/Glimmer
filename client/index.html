<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Glimmer Platform</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; color: white; pointer-events: none; }
        .panel { background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #00ffcc; margin-bottom: 5px; pointer-events: auto; }
        button { background: #00ffcc; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="panel">Glimmer Alpha v0.4</div>
        <div class="panel">Coins: <span id="coin-count">0</span></div>
        <button onclick="window.toggleShop()">МАГАЗИН</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="engine.js"></script>
</body>
</html>
